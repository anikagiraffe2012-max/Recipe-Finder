<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Recipe Finder</title>
        <link rel="stylesheet" href="style.css">    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>Recipe Finder</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1> Recipe Finder </h1>
            <p class="subtitle">Search for recipes by ingredient or dish name!</p>
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="e.g. pasta, tomatoes, cake"/>
                <button id="searchBtn">Search</button>
            </div>
            <div id="loading" class="loading hidden">Loading recipes...</div>
            <div id="errorMessage" class="error hidden"></div>
            <div id="recipeGrid" class="recipe-grid"></div>
        </div>
        <div id="recipeModal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn" id="closeModal">&times;</span>
                <h2 id="modalTitle"></h2>
                <img id="modalImage" src="" alt=""/>
                <div class="modal-details">
                    <h3>Ingredients</h3>
                    <ul id="modalIngredients"></ul>
                    <h3>Instructions</h3>
                    <p id="modalInstructions"></p>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>

</html>
